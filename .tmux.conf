# ──────────────────────────────────────────────
# Prefix
# ──────────────────────────────────────────────
# Remap prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ──────────────────────────────────────────────
# General
# ──────────────────────────────────────────────
# Reduce escape delay (critical for Neovim)
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Status bar message display time
set -g display-time 4000

# Refresh status bar more frequently
set -g status-interval 5

# Enable mouse (resize panes, switch windows, scroll)
set -g mouse on

# Pass focus events to programs (Neovim auto-reload)
set -g focus-events on

# Allow Kitty graphics protocol passthrough so mdcat / kitten icat / image
# renderers work inside tmux panes (Ghostty supports the protocol).
set -gq allow-passthrough on

# Start window/pane numbering at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# True color support (needed for Neovim themes)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Vi copy mode
set-window-option -g mode-keys vi

# Aggressive resize for multi-client setups
setw -g aggressive-resize on

# ──────────────────────────────────────────────
# Key bindings -- splits
# ──────────────────────────────────────────────
# Intuitive split keys (inherit current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# ──────────────────────────────────────────────
# Key bindings -- navigation
# ──────────────────────────────────────────────
# Navigate panes with Vim keys (no prefix needed)
# M-j / M-k handled in the smart-switching section below so they pass through
# to Neovim (line move) when nvim is the foreground app in the pane.
bind -n M-h select-pane -L
bind -n M-l select-pane -R

# Navigate windows with Shift-arrow
bind -n S-Left previous-window
bind -n S-Right next-window

# Move current window left/right with prefix + < / >
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Smart pane switching with awareness of Neovim splits
# (vim-tmux-navigator integration)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE 'S\\+\\s*n?vim'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
# C-k left unbound — passes through to shell (kill-line)
# bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# M-j / M-k: pass through to nvim (line move) when focused, else navigate panes
bind-key -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind-key -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"

# ──────────────────────────────────────────────
# Key bindings -- copy mode (vi style)
# ──────────────────────────────────────────────
# Smoother mouse wheel scrolling (3 lines per tick)
bind-key -T copy-mode-vi WheelUpPane   send -N3 -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send -N3 -X scroll-down

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ──────────────────────────────────────────────
# Key bindings -- utility
# ──────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ──────────────────────────────────────────────
# Status bar
# ──────────────────────────────────────────────
set -g status-position top

# ──────────────────────────────────────────────
# Plugins (TPM)
# ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

# Continuum: auto-save every 10 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Resurrect: also capture pane contents
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Override catppuccin defaults after TPM loads
set -g window-status-format "#[fg=#cdd6f4,bg=#{@thm_surface_0}]  #I  #W  "
set -g window-status-current-format "#[fg=#11111b,bg=#{@thm_peach},bold] ▶ #I  #W "
set -g window-status-separator " "
set -g status-left-length 30

# Unbind C-k from vim-tmux-navigator so it passes through to shell (kill-line)
unbind -n C-k
